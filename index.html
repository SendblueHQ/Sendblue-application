document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d: var(--blue);\n    opacity: 0.5;\n  }\n\n  /* nav logo on all slides */\n  .nav-bar {\n    position: absolute;\n    top: 48px; left: 80px; right: 80px;\n    display: flex; align-items: center; justify-content: space-between;\n    z-index: 10;\n  }\n  .nav-logo {\n    display: flex; align-items: center; gap: 14px;\n  }\n  .nav-logo img { width: 36px; height: 36px; object-fit: contain; }\n  .nav-logo span { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }\n  .slide-num { font-size: 24px; font-weight: 500; color: var(--muted); }\n\n  /* ═══════════════════════════════════════\n     SLIDE 1 — COVER\n  ═══════════════════════════════════════ */\n  #s1 { background: var(--navy); }\n  #s1 .bg-glow {\n    position: absolute; top: -300px; right: -200px;\n    width: 900px; height: 900px; border-radius: 50%;\n    background: radial-gradient(circle, rgba(30,156,240,0.18) 0%, transparent 70%);\n  }\n  #s1 .bg-glow2 {\n    position: absolute; bottom: -400px; left: -200px;\n    width: 700px; height: 700px; border-radius: 50%;\n    background: radial-gradient(circle, rgba(30,156,240,0.08) 0%, transparent 70%);\n  }\n  #s1 .content {\n    position: absolute; top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    text-align: center;\n    display: flex; flex-direction: column; align-items: center; gap: 28px;\n  }\n  #s1 .big-logo {\n    width: 90px; height: 90px; object-fit: contain;\n    filter: drop-shadow(0 0 24px rgba(30,156,240,0.5));\n  }\n  #s1 h1 {\n    font-size: 80px; font-weight: 800; line-height: 1.05;\n    letter-spacing: -0.03em; color: var(--white);\n    max-width: 900px;\n  }\n  #s1 h1 em { color: var(--blue); font-style: normal; }\n  #s1 .sub {\n    font-size: 24px; font-weight: 400; color: var(--muted);\n    max-width: 640px; line-height: 1.5;\n  }\n  #s1 .divider {\n    width: 1px; height: 48px; background: var(--rule);\n  }\n  #s1 .meta {\n    display: flex; gap: 48px; align-items: center;\n  }\n  #s1 .meta-item { text-align: center; }\n  # tent: center;\n    font-size: 24px; font-weight: 900; color: #f87171;\n    flex-shrink: 0; margin-top: 2px;\n  }\n  #s9 .pay-item .text h4 { font-size: 26px; font-weight: 700; color: #fca5a5; margin-bottom: 4px; }\n  #s9 .pay-item .text p { font-size: 24px; color: var(--off-white); line-height: 1.55; }\n  #s9 .note {\n    padding: 16px 24px; border-radius: 8px;\n    background: var(--blue-dim); border: 1px solid rgba(30,156,240,0.3);\n    font-size: 24px; color: var(--off-white); line-height: 1.6;\n  }\n\n  /* ═══════════════════════════════════════\n     SLIDE 10 — 2 STRIKE RULE\n  ═══════════════════════════════════════ */\n  #s10 .inner {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 0 160px; gap: 52px;\n  }\n  #s10 .top { display: flex; flex-direction: column; gap: 20px; }\n  #s10 h2 { font-size: 60px; font-weight: 800; letter-spacing: -0.03em; }\n  #s10 h2 em { color: #f87171; font-style: normal; }\n  #s10 .strikes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }\n  #s10 .strike-card {\n    padding: 32px 32px; border-radius: 14px;\n    border: 1px solid var(--rule); background: var(--navy-mid);\n    display: flex; flex-direction: column; gap: 16px;\n  }\n  #s10 .strike-card .badge {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 24px; font-weight: 800; letter-spacing: 0.08em;\n    text-transform: uppercase; width: fit-content;\n  }\n  #s10 .strike-card.s1 .badge { color: #fb923c; }\n  #s10 .strike-card.s2 .badge { color: #f87171; }\n  #s10 .strike-card.s3 .badge { color: #c084fc; }\n  #s10 .strike-card h4 { font-size: 26px; font-weight: 700; }\n  #s10 .strike-card p { font-size: 24px; color: var(--off-white); line-height: 1.6; }\n  #s10 .strike-card .outcome {\n    margin-top: auto; padding: 12px 16px; border-radius: 8px;\n    font-size: 24px; font-weight: 600;\n  }\n  #s10 .strike-card.s1 .outcome { background: rgba(251,146,60,0.1); color: #fb923c; }\n  #s10 .strike-card.s2 .outcome { background: rgba(248,113,113,0.1); color: #f87171; }\n  #s10 .strike-card.s3 .outcome { background: rgba(192,132,252,0.1); color: #c084fc; }\n  #s10 .bottom-note {\n    font-size: 24px; color: var(--muted); text-align: center; font-style: italic;\n  }\n\n  /* ═══════════════════════════════════════\n     SLIDE 11 — GOOD VS BAD\n  ═══════════════════════════════════════ */\n  #s11 .inner {\n    position: absolute; inset: 0;\n    display: grid; grid-template-columns: 1fr 1fr;\n  }\n  #s11 .col {\n    display: flex; flex-direction: column;\n    padding: 100px 80px;\n  }\n  #s11 .col.good { border-right: 1px solid var(--rule); }\n  #s11 .col-label {\n    font-size: 24px; font-weight: 800; letter-spacing: 0.1em;\n    text-transform: uppercase; margin-bottom: 32px;\n  }\n  #s11 .col.good .col-label { color: #4ade80; }\n  #s11 .col.bad .col-label { color: #f87171; }\n  #s11 h3 { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 40px; line-height: 1.1; }\n  #s11 .example {\n    padding: 20px 24px; border-radius: 10px;\n    margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px;\n  }\n  #s11 .col.good .example {\n    background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.25);\n  }\n  #s11 .col.bad .example {\n    background: rgba(220,50,50,0.07); border: 1px solid rgba(220,50,50,0.25);\n  }\n  #s11 .example .ex-label {\n    font-size: 24px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;\n  }\n  #s11 .col.good .example .ex-label { color: #4ade80; }\n  #s11 .col.bad .example .ex-label { color: #f87171; }\n  #s11 .example .ex-text { font-size: 24px; color: var(--white); line-height: 1.55; }\n  #s11 .example .ex-note { font-size: 24px; color: var(--muted); }\n\n  /* ═══════════════════════════════════════\n     SLIDE 12 — VIDEO REFERENCES\n  ═══════════════════════════════════════ */\n  #s12-vid .inner {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 140px 160px 80px; gap: 40px;\n  }\n  #s12-vid .top { display: flex; flex-direction: column; gap: 20px; }\n  #s12-vid h2 { font-size: 60px; font-weight: 800; letter-spacing: -0.03em; }\n  #s12-vid h2 em { color: var(--blue); font-style: normal; }\n  #s12-vid .grid {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;\n  }\n  #s12-vid .vid-card {\n    display: flex; flex-direction: column; gap: 14px;\n    padding: 28px 24px; border-radius: 14px;\n    background: var(--navy-mid); border: 1px solid var(--rule);\n    text-decoration: none; color: inherit;\n  }\n  #s12-vid .vid-card .platform {\n    display: flex; align-items: center; gap: 10px;\n    font-size: 24px; font-weight: 700;\n  }\n  #s12-vid .vid-card .platform.yt { color: #ff4444; }\n  #s12-vid .vid-card .platform.ig { color: #e1306c; }\n  #s12-vid .vid-card .platform-icon {\n    width: 40px; height: 40px; border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 24px; flex-shrink: 0;\n  }\n  #s12-vid .vid-card .platform-icon.yt { background: rgba(255,68,68,0.15); }\n  #s12-vid .vid-card .platform-icon.ig { background: rgba(225,48,108,0.15); }\n  #s12-vid .vid-card .url {\n    font-size: 24px; color: var(--blue-light);\n    word-break: break-all; line-height: 1.4;\n    text-decoration: underline; text-underline-offset: 3px;\n  }\n  #s12-vid .vid-card .desc {\n    font-size: 24px; color: var(--muted); line-height: 1.5; margin-top: auto;\n  }\n  #s12-vid .note {\n    font-size: 24px; color: var(--muted); font-style: italic; text-align: center;\n  }\n\n  /* ═══════════════════════════════════════\n     SLIDE 13 — CLOSE\n  ═══════════════════════════════════════ */\n  #s12 { background: var(--navy); }\n  #s12 .bg-glow {\n    position: absolute; top: -200px; left: 50%; transform: translateX(-50%);\n    width: 1000px; height: 600px; border-radius: 50%;\n    background: radial-gradient(circle, rgba(30,156,240,0.15) 0%, transparent 70%);\n  }\n  #s12 .content {\n    position: absolute; top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    text-align: center;\n    display: flex; flex-direction: column; align-items: center; gap: 32px;\n  }\n  #s12 img { width: 80px; filter: drop-shadow(0 0 20px rgba(30,156,240,0.5)); }\n  #s12 h2 { font-size: 72px; font-weight: 800; letter-spacing: -0.03em; }\n  #s12 h2 em { color: var(--blue); font-style: normal; }\n  #s12 p { font-size: 26px; color: var(--muted); line-height: 1.6; max-width: 640px; }\n  #s12 .checklist {\n    display: flex; flex-direction: column; gap: 12px;\n    align-items: flex-start; background: var(--navy-mid);\n    border: 1px solid var(--rule); border-radius: 14px;\n    padding: 32px 40px; min-width: 500px;\n  }\n  #s12 .check-item {\n    display: flex; align-items: center; gap: 16px;\n    font-size: 26px; color: var(--white);\n  }\n  #s12 .check-item::before {\n    content: '✓'; width: 24px; height: 24px; border-radius: 50%;\n    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4);\n    color: #4ade80; font-size: 24px; font-weight: 900;\n    display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n  }\n<\u002Fstyle>\n\n\n<\u002Fhead><body>\n<deck-stage>\n\n  <!-- ═══ SLIDE 1: COVER ═══ -->\n  <section id=\"s1\" data-screen-label=\"01 Cover\">\n    <div class=\"bg-glow\"><\u002Fdiv>\n    <div class=\"bg-glow2\"><\u002Fdiv>\n    <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:var(--rule)\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--rule)\"><\u002Fdiv>\n\n    <div class=\"content\">\n      <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" class=\"big-logo\" alt=\"Sendblue\">\n      <h1>Editor <em>Onboarding<\u002Fem><br>Guide<\u002Fh1>\n      <p class=\"sub\">Everything you need to represent Sendblue's brand with clarity, taste, and consistency.<\u002Fp>\n      <div class=\"divider\"><\u002Fdiv>\n      <div class=\"meta\">\n        <div class=\"meta-item\">\n          <div class=\"val\">9<\u002Fdiv>\n          <div class=\"key\">Sections<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:40px;background:var(--rule)\"><\u002Fdiv>\n        <div class=\"meta-item\">\n          <div class=\"val\">0<\u002Fdiv>\n          <div class=\"key\">Caption Errors<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:40px;background:var(--rule)\"><\u002Fdiv>\n        <div class=\"meta-item\">\n          <div class=\"val\">24H<\u002Fdiv>\n          <div class=\"key\">Response Time<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">01 / 13<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 2: WHO WE ARE ═══ -->\n  <section id=\"s2\" data-screen-label=\"02 Who We Are\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">02 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"left\">\n        <span class=\"label\">Brand Overview<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Who We <em>Are<\u002Fem><\u002Fh2>\n        <p>Sendblue is a B2B messaging platform that enables businesses to send compliant, high-deliverability text messages at scale. We operate in a highly technical space — and our content must reflect that with precision.<\u002Fp>\n        <p>Our short-form content educates business owners and decision-makers on messaging compliance, SMS strategy, and the power of peer-to-peer communication.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"pillar\">\n          <div class=\"title\">Our Mission<\u002Fdiv>\n          <div class=\"desc\">Make business messaging personal, compliant, and effective — and educate the market through world-class short-form content.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"title\">Our Audience<\u002Fdiv>\n          <div class=\"desc\">Business owners, marketers, and operators who use or need SMS to reach their customers. Verticals include healthcare (GLP-1, Telemed), e-commerce, and SaaS.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pillar\">\n          <div class=\"title\">Our Standard<\u002Fdiv>\n          <div class=\"desc\">Clarity and accuracy over flash. Every word in a caption, every on-screen term, and every graphic must be correct. There is no acceptable margin for error.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 3: PRODUCT KNOWLEDGE ═══ -->\n  <section id=\"s3\" data-screen-label=\"03 Product Knowledge\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">03 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"header\">\n        <span class=\"label\">Product Knowledge<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>What <em>Sendblue<\u002Fem> Does<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cards\">\n        <div class=\"card\">\n          <div class=\"icon\">📱<\u002Fdiv>\n          <h3>iMessage &amp; SMS<\u002Fh3>\n          <p>Sendblue sends via iMessage and SMS. Editors must understand the difference — they have distinct compliance requirements.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"icon\">🏢<\u002Fdiv>\n          <h3>A2P Messaging<\u002Fh3>\n          <p>A2P messaging is how businesses send mass texts. Sendblue navigates A2P 10DLC registration to keep clients compliant with Twilio carrier rules.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"icon\">👤<\u002Fdiv>\n          <h3>P2P Messaging<\u002Fh3>\n          <p>Person-to-Person messaging feels personal and drives higher open rates. Sendblue makes P2P-style messaging scalable — a core differentiator.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"icon\">💊<\u002Fdiv>\n          <h3>GLP-1 &amp; Telemed<\u002Fh3>\n          <p>Healthcare is a major vertical. GLP-1 = weight-loss medications (Ozempic, etc.). Telemed = virtual care. These clients use Sendblue for patient outreach.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"icon\">⚙️<\u002Fdiv>\n          <h3>Twilio<\u002Fh3>\n          <p>Leading SMS infrastructure provider. Sendblue operates alongside or as an alternative to Twilio. Always spell it correctly: Twilio — capital T.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"icon\">📋<\u002Fdiv>\n          <h3>10DLC<\u002Fh3>\n          <p>10 Digit Long Code — the standard US format for A2P texting. Every A2P sender must complete 10DLC registration. Spell it exactly: 10DLC.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 4: SENDBLUE-ISMS ═══ -->\n  <section id=\"s4\" data-screen-label=\"04 Sendblue-isms\">\n    <div class=\"nav-bar\" style=\"z-index:20\">\n      <div class=\"nav-logo\">\n        <img src=\"5ec619f6-4e41-4cde-ae42-83b269908a94\" alt=\"Sendblue\" style=\"width:80px;height:80px;object-fit:contain;\">\n        <span style=\"color:var(--white);font-size:32px\">Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\" style=\"color:rgba(255,255,255,0.5)\">04 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"left\">\n        <span class=\"label\" style=\"color:var(--navy);opacity:0.6\">Vocabulary<\u002Fspan>\n        <div style=\"width:48px;height:3px;background:var(--navy);opacity:0.3;border-radius:2px\"><\u002Fdiv>\n        <h2>Sendblue‑isms<\u002Fh2>\n        <p>These are non-negotiable terms. They must appear exactly as written — every caption, every time.<\u002Fp>\n        <div style=\"padding:20px 24px;background:rgba(26,31,58,0.15);border-radius:10px;font-size:24px;color:rgba(26,31,58,0.7);line-height:1.6;\">\n          Misspelling or misusing any of these terms is grounds for non-payment under the 2 Strike Rule.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"ism-row\">\n          <div class=\"ism-term\">A2P 10DLC<\u002Fdiv>\n          <div><div class=\"ism-def\">Application-to-Person 10 Digit Long Code. The complete regulatory term for business SMS campaigns. Always written as A2P 10DLC — all caps, no spaces within each acronym.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ism-row\">\n          <div class=\"ism-term\">A2P<\u002Fdiv>\n          <div><div class=\"ism-def\">Application-to-Person. Refers to mass/automated business texting. Distinct from P2P. Always capitalized: A2P.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ism-row\">\n          <div class=\"ism-term\">P2P<\u002Fdiv>\n          <div><div class=\"ism-def\">Person-to-Person. Conversational, 1:1 style messaging. Always capitalized: P2P.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ism-row\">\n          <div class=\"ism-term\">Twilio<\u002Fdiv>\n          <div><div class=\"ism-def\">Proper noun — a company name. Always \"Twilio\" with capital T. Never \"twilio\" or \"TWILIO.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ism-row\">\n          <div class=\"ism-term\">iMessage<\u002Fdiv>\n          <div><div class=\"ism-def\">Apple's messaging platform. Lowercase \"i\", capital \"M\" — exactly like Apple writes it. Never \"iMessage,\" \"Imessage,\" or \"imessage.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ism-row\" style=\"border-bottom:none\">\n          <div class=\"ism-term\">GLP-1 / Telemed<\u002Fdiv>\n          <div><div class=\"ism-def\">GLP-1 always hyphenated, all caps. Telemed is one word, capital T. These are healthcare vertical terms used frequently in content.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 5: EDITING STYLE ═══ -->\n  <section id=\"s5\" data-screen-label=\"05 Editing Style\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">05 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"left\">\n        <span class=\"label\">Style Guide<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Editing <em>Style<\u002Fem><\u002Fh2>\n        <div class=\"quote-block\">\n          <p>\"We care about clarity, taste, and consistency more than flashy effects.\"<\u002Fp>\n          <div class=\"attr\">— Sendblue Hiring Standard<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:24px;color:var(--off-white);line-height:1.65\">Our content is short-form, high-retention, information-dense. Every cut, caption, and transition must serve the message — not the editor's personal style.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"principle\">\n          <div class=\"num\">01<\u002Fdiv>\n          <div class=\"body\">\n            <h4>Clarity First<\u002Fh4>\n            <p>Viewers should instantly understand the point. No slow intros, no fluff. Hook in the first 2 seconds. Every frame earns its place.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:var(--rule)\"><\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"num\">02<\u002Fdiv>\n          <div class=\"body\">\n            <h4>Pacing is Tight<\u002Fh4>\n            <p>Short-form content moves fast. Cut on the beat, remove filler words, keep the energy consistent. Dead air is dead content.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:var(--rule)\"><\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"num\">03<\u002Fdiv>\n          <div class=\"body\">\n            <h4>On-Brand Visuals<\u002Fh4>\n            <p>Stick to the Sendblue palette. Dark navy backgrounds, blue accents, clean white text. No random color choices. B-roll must be relevant and high quality.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:var(--rule)\"><\u002Fdiv>\n        <div class=\"principle\">\n          <div class=\"num\">04<\u002Fdiv>\n          <div class=\"body\">\n            <h4>No Unsolicited Style Choices<\u002Fh4>\n            <p>Do not introduce new fonts, effects, or transitions without approval. Reference provided templates and stick to them until explicitly told otherwise.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 6: CAPTION GUIDELINES ═══ -->\n  <section id=\"s6\" data-screen-label=\"06 Caption Guidelines\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">06 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"top\">\n        <span class=\"label\">Caption Standards<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Caption <em>Guidelines<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"mandate\">\n        Zero caption or spelling errors is non-negotiable. Consistent mistakes trigger the 2 Strike Rule and forfeit payment.\n      <\u002Fdiv>\n      <div class=\"rules\">\n        <div class=\"rule-card bad\">\n          <div class=\"tag\">❌ Never Do This<\u002Fdiv>\n          <h4>Wrong Term Casing<\u002Fh4>\n          <p>Writing \"imessage,\" \"twilio,\" \"a2p,\" or \"glp1\" — every Sendblue-ism has a precise capitalization that must be followed exactly.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"rule-card good\">\n          <div class=\"tag\">✓ Always Do This<\u002Fdiv>\n          <h4>Proofread Before Delivery<\u002Fh4>\n          <p>Read every caption line-by-line before submitting. Use spell-check. Cross-reference the Sendblue-isms list. No exceptions.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"rule-card bad\">\n          <div class=\"tag\">❌ Never Do This<\u002Fdiv>\n          <h4>Filler Words &amp; Incomplete Sentences<\u002Fh4>\n          <p>Captions must be clean and complete. Remove \"uh,\" \"um,\" stutters, and repeated words unless they serve a stylistic purpose agreed on in advance.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"rule-card good\">\n          <div class=\"tag\">✓ Always Do This<\u002Fdiv>\n          <h4>Match Speaker's Intent<\u002Fh4>\n          <p>Captions must accurately represent what was said. Do not paraphrase, truncate, or reword the spoken content without explicit instruction.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 7: BRANDING GUIDELINES ═══ -->\n  <section id=\"s7\" data-screen-label=\"07 Branding Guidelines\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">07 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"left\">\n        <span class=\"label\">Visual Identity<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Branding <em>Guidelines<\u002Fem><\u002Fh2>\n        <div class=\"logo-preview\">\n          <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"Sendblue logo\">\n          <span>Sendblue<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div class=\"label\" style=\"font-size:24px\">Color Palette<\u002Fdiv>\n          <div class=\"color-row\">\n            <div class=\"swatch\">\n              <div class=\"dot\" style=\"background:#1a1f3a\"><\u002Fdiv>\n              <div class=\"name\">Navy<\u002Fdiv>\n              <div class=\"hex\">#1A1F3A<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"swatch\">\n              <div class=\"dot\" style=\"background:#1E9CF0\"><\u002Fdiv>\n              <div class=\"name\">Blue<\u002Fdiv>\n              <div class=\"hex\">#1E9CF0<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"swatch\">\n              <div class=\"dot\" style=\"background:#ffffff;border:1px solid rgba(255,255,255,0.2)\"><\u002Fdiv>\n              <div class=\"name\">White<\u002Fdiv>\n              <div class=\"hex\">#FFFFFF<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px;color:var(--muted);line-height:1.6\">Typography: Clean sans-serif. Bold for headlines, regular for body. No decorative or script fonts without approval.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"brand-rule\">\n          <div class=\"icon\">🔵<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Use Only Approved Templates<\u002Fh4>\n            <p>All graphic templates, lower thirds, and motion elements have been pre-approved. Do not substitute or improvise. If a template doesn't exist for a use case, ask before creating.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"brand-rule\">\n          <div class=\"icon\">🚫<\u002Fdiv>\n          <div class=\"text\">\n            <h4>No Unauthorized Fonts or Effects<\u002Fh4>\n            <p>Stick to the approved type system. No gradient text, no random animations, no effects that distract from the message. Clarity over style.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"brand-rule\">\n          <div class=\"icon\">📐<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Consistent Aspect Ratios<\u002Fh4>\n            <p>Short-form content is delivered in 9:16 vertical (1080×1920) unless specified. Confirm format before starting every project.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"brand-rule\">\n          <div class=\"icon\">🎨<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Logo Usage<\u002Fh4>\n            <p>The Sendblue logo may only appear on dark navy or white backgrounds. No drop shadows, color inversions, or modifications to the logo mark without explicit sign-off.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 8: COMMUNICATION ═══ -->\n  <section id=\"s8\" data-screen-label=\"08 Communication Standards\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">08 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"top\">\n        <span class=\"label\">Expectations<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Communication <em>Standards<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"timeline\">\n        <div class=\"t-item\">\n          <div class=\"dot\">24H<\u002Fdiv>\n          <div class=\"body\">\n            <h4>24-Hour Response Rule<\u002Fh4>\n            <p>All communications from the Sendblue team — whether a brief, revision request, or question — must receive a response within 24 hours. No exceptions. This is a condition of continued engagement.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-item\">\n          <div class=\"dot\">48H<\u002Fdiv>\n          <div class=\"body\">\n            <h4>Project Acknowledgment<\u002Fh4>\n            <p>When a new project or revision request is sent, you must acknowledge receipt and confirm your timeline within 48 hours. Silence is not acceptance.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-item\">\n          <div class=\"dot\">👁<\u002Fdiv>\n          <div class=\"body\">\n            <h4>Proactive Communication<\u002Fh4>\n            <p>If you encounter a problem — a missing asset, an unclear brief, a technical issue — communicate it immediately. Do not wait until a deadline to surface blockers. Flag early, flag often.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"alert\">\n        Failure to respond within 24 hours constitutes a breach of contract and forfeits payment for the project in question.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 9: PAYMENT TERMS ═══ -->\n  <section id=\"s9\" data-screen-label=\"09 Payment Terms\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">09 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"left\">\n        <span class=\"label\">Contractor Terms<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Payment <em>Terms<\u002Fem><\u002Fh2>\n        <p class=\"sub\">Payment is contingent on meeting all deliverable standards. The following are explicit grounds for non-payment or project rejection.<\u002Fp>\n        <div class=\"note\">\n          Payment is released only upon full compliance with brand, caption, communication, and quality standards outlined in this guide.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"pay-item\">\n          <div class=\"x\">✕<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Caption Mistakes<\u002Fh4>\n            <p>Consistent or repeated caption errors — including spelling, punctuation, and incorrect Sendblue-isms — result in forfeited payment. Two strikes and you're out.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pay-item\">\n          <div class=\"x\">✕<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Sendblue-isms Not Followed<\u002Fh4>\n            <p>Incorrect use of brand-specific terminology (A2P, P2P, iMessage, Twilio, 10DLC, GLP-1, Telemed) will result in rejection. These must be right, every time.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pay-item\">\n          <div class=\"x\">✕<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Branding Guideline Violations<\u002Fh4>\n            <p>Deviating from approved templates, fonts, colors, or logo usage without approval constitutes a deliverable failure and forfeits payment for that project.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pay-item\">\n          <div class=\"x\">✕<\u002Fdiv>\n          <div class=\"text\">\n            <h4>Lack of Communication<\u002Fh4>\n            <p>Failing to respond within 24 hours or acknowledge a brief within 48 hours voids the payment agreement for that specific project.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 10: 2 STRIKE RULE ═══ -->\n  <section id=\"s10\" data-screen-label=\"10 The 2 Strike Rule\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">10 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"top\">\n        <span class=\"label\">Enforcement<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>The <em>2 Strike<\u002Fem> Rule<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"strikes\">\n        <div class=\"strike-card s1\">\n          <div class=\"badge\">⚡ Strike 1<\u002Fdiv>\n          <h4>First Offense<\u002Fh4>\n          <p>A formal written notice is issued. The specific violation is documented. Payment for that deliverable may be withheld or reduced depending on severity. The editor is given a clear correction brief.<\u002Fp>\n          <div class=\"outcome\">Warning issued — correction required before payment release.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"strike-card s2\">\n          <div class=\"badge\">🔴 Strike 2<\u002Fdiv>\n          <h4>Second Offense<\u002Fh4>\n          <p>Payment is forfeited for the project in which the violation occurred. The violation is documented. The working relationship is reviewed and may be terminated depending on the nature of the breach.<\u002Fp>\n          <div class=\"outcome\">Payment forfeited — relationship under review.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"strike-card s3\">\n          <div class=\"badge\">⛔ Termination<\u002Fdiv>\n          <h4>Pattern of Violations<\u002Fh4>\n          <p>Repeated or systemic failures — regardless of whether they reach formal \"strike\" status — are grounds for immediate contract termination without further notice or payment.<\u002Fp>\n          <div class=\"outcome\">Contract terminated — no further projects assigned.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bottom-note\">Violations that qualify: caption errors · Sendblue-ism misuse · branding deviations · communication failures<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 11: GOOD VS BAD ═══ -->\n  <section id=\"s11\" data-screen-label=\"11 Good vs Bad\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">11 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"col good\">\n        <div class=\"col-label\">✓ Accepted — This is the standard<\u002Fdiv>\n        <h3>What Good<br>Looks Like<\u002Fh3>\n        <div class=\"example\">\n          <div class=\"ex-label\">Caption Example<\u002Fdiv>\n          <div class=\"ex-text\">\"Most businesses don't know they're violating A2P 10DLC rules — until Twilio flags them.\"<\u002Fdiv>\n          <div class=\"ex-note\">Correct casing, precise terminology, no errors.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"example\">\n          <div class=\"ex-label\">Communication Example<\u002Fdiv>\n          <div class=\"ex-text\">Brief received at 9am. Editor acknowledges at 11am, confirms delivery date, flags one missing asset immediately.<\u002Fdiv>\n          <div class=\"ex-note\">Proactive, within 24 hours, no guesswork.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"example\">\n          <div class=\"ex-label\">Edit Delivery<\u002Fdiv>\n          <div class=\"ex-text\">Clean timeline, approved templates used, captions proofread, correct 9:16 export, submitted with revision notes.<\u002Fdiv>\n          <div class=\"ex-note\">Follows brief exactly. No surprises.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col bad\">\n        <div class=\"col-label\">✕ Rejected — This forfeits payment<\u002Fdiv>\n        <h3>What Gets<br>Rejected<\u002Fh3>\n        <div class=\"example\">\n          <div class=\"ex-label\">Caption Example<\u002Fdiv>\n          <div class=\"ex-text\">\"Most businesses don't know they're violating a2p 10dlc rules — until twilio flags them.\"<\u002Fdiv>\n          <div class=\"ex-note\">Incorrect casing on A2P, 10DLC, and Twilio. Strike 1.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"example\">\n          <div class=\"ex-label\">Communication Example<\u002Fdiv>\n          <div class=\"ex-text\">Brief sent Monday. Editor responds Thursday with \"sorry been busy, starting now.\"<\u002Fdiv>\n          <div class=\"ex-note\">36-hour silence. Communication violation. Payment voided.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"example\">\n          <div class=\"ex-label\">Edit Delivery<\u002Fdiv>\n          <div class=\"ex-text\">New font introduced \"because it looks better.\" Custom color scheme added. Template not used.<\u002Fdiv>\n          <div class=\"ex-note\">Unsolicited style changes. Branding violation. Rejected.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 12: VIDEO REFERENCES ═══ -->\n  <section id=\"s12-vid\" data-screen-label=\"12 Video Style References\">\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">12 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"inner\">\n      <div class=\"top\">\n        <span class=\"label\">Style References<\u002Fspan>\n        <div class=\"rule-h\"><\u002Fdiv>\n        <h2>Videos We <em>Accept<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"grid\">\n        <a class=\"vid-card\" href=\"https://www.youtube.com/shorts/7Z_DaRpY7_U\" target=\"_blank\">\n          <div class=\"platform yt\"><div class=\"platform-icon yt\">▶<\u002Fdiv> YouTube Short<\u002Fdiv>\n          <div class=\"url\">youtube.com/shorts/7Z_DaRpY7_U<\u002Fdiv>\n          <div class=\"desc\">Reference example #1 — study the pacing, caption style, and visual treatment.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.youtube.com/shorts/fw4XaZhd7wA\" target=\"_blank\">\n          <div class=\"platform yt\"><div class=\"platform-icon yt\">▶<\u002Fdiv> YouTube Short<\u002Fdiv>\n          <div class=\"url\">youtube.com/shorts/fw4XaZhd7wA<\u002Fdiv>\n          <div class=\"desc\">Reference example #2 — note the hook structure and tight editing rhythm.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.youtube.com/shorts/6elLGsF0ICU\" target=\"_blank\">\n          <div class=\"platform yt\"><div class=\"platform-icon yt\">▶<\u002Fdiv> YouTube Short<\u002Fdiv>\n          <div class=\"url\">youtube.com/shorts/6elLGsF0ICU<\u002Fdiv>\n          <div class=\"desc\">Reference example #3 — observe how captions are timed and formatted.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.youtube.com/shorts/Ulp62OKmru0\" target=\"_blank\">\n          <div class=\"platform yt\"><div class=\"platform-icon yt\">▶<\u002Fdiv> YouTube Short<\u002Fdiv>\n          <div class=\"url\">youtube.com/shorts/Ulp62OKmru0<\u002Fdiv>\n          <div class=\"desc\">Reference example #4 — benchmark for energy, tone, and brand alignment.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.instagram.com/reel/DVj1fUiDOuW/\" target=\"_blank\">\n          <div class=\"platform ig\"><div class=\"platform-icon ig\">◈<\u002Fdiv> Instagram Reel<\u002Fdiv>\n          <div class=\"url\">instagram.com/reel/DVj1fUiDOuW<\u002Fdiv>\n          <div class=\"desc\">Reel reference #1 — match this level of polish and caption accuracy.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.instagram.com/reel/DSTG_y2ElNG/\" target=\"_blank\">\n          <div class=\"platform ig\"><div class=\"platform-icon ig\">◈<\u002Fdiv> Instagram Reel<\u002Fdiv>\n          <div class=\"url\">instagram.com/reel/DSTG_y2ElNG<\u002Fdiv>\n          <div class=\"desc\">Reel reference #2 — pay attention to b-roll selection and pacing.<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"vid-card\" href=\"https://www.instagram.com/reel/DWXKb60gcbe/\" target=\"_blank\">\n          <div class=\"platform ig\"><div class=\"platform-icon ig\">◈<\u002Fdiv> Instagram Reel<\u002Fdiv>\n          <div class=\"url\">instagram.com/reel/DWXKb60gcbe<\u002Fdiv>\n          <div class=\"desc\">Reel reference #3 — the gold standard for Sendblue short-form content.<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"note\">Click any link to view. These are the benchmarks — your work should meet or exceed this standard.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ SLIDE 13: CLOSE ═══ -->\n  <section id=\"s12\" data-screen-label=\"13 Welcome\">\n    <div class=\"bg-glow\"><\u002Fdiv>\n    <div class=\"nav-bar\">\n      <div class=\"nav-logo\">\n        <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"\">\n        <span>Sendblue<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"slide-num\">13 / 13<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"content\">\n      <img src=\"16c74f6b-c123-49bd-927a-a267f355aac4\" alt=\"Sendblue\">\n      <h2>Welcome to the<br><em>Sendblue<\u002Fem> Team.<\u002Fh2>\n      <p>You've been selected because we believe you have the taste, precision, and work ethic to represent this brand. Hold yourself to the standard in this guide — every single time.<\u002Fp>\n      <div class=\"checklist\">\n        <div class=\"check-item\">Read and understand all Sendblue-isms<\u002Fdiv>\n        <div class=\"check-item\">Bookmark the branding guidelines<\u002Fdiv>\n        <div class=\"check-item\">Set a 24-hour communication alert<\u002Fdiv>\n        <div class=\"check-item\">Zero tolerance for caption errors<\u002Fdiv>\n        <div class=\"check-item\">Follow templates. Ask before improvising.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Welcome to the Sendblue Editor Onboarding Guide. This deck covers everything you need to know before delivering your first project. Please read every slide carefully — this is the operating manual for our working relationship.\",\n  \"Sendblue is a B2B SMS platform. We're not a lifestyle brand or a consumer product. Our content speaks to business operators, marketers, and technical decision-makers. That means precision and clarity are mandatory — not optional.\",\n  \"Before you edit a single frame, you need to understand what Sendblue does. iMessage, SMS, A2P, P2P, Twilio, GLP-1 — these aren't just buzzwords. They are the product. Know them cold.\",\n  \"These are the Sendblue-isms. Every single term on this slide has a specific spelling and casing that you must follow exactly. A2P is always capitalized. iMessage always has a lowercase i and capital M. Twilio is a proper noun. There is no wiggle room here.\",\n  \"Our editing style is tight, clear, and on-brand. We are not interested in flashy transitions or personal style choices. You are here to serve the content — not the other way around. Cut filler, keep energy, follow the brief.\",\n  \"Captions are one of the highest-value deliverables in short-form content. A single caption error reflects on the brand. Two consistent mistakes triggers the 2 Strike Rule. Proofread everything. No exceptions.\",\n  \"Every visual element in a Sendblue video must follow the approved brand guidelines. Dark navy backgrounds, blue accents, white text, the correct logo treatment. Do not introduce new colors, fonts, or effects without explicit approval.\",\n  \"Communication is a deliverable. Responding within 24 hours is not a courtesy — it is a contractual requirement. Silence forfeits payment. Flag blockers early. Confirm briefs immediately.\",\n  \"Payment is earned by meeting every standard in this guide. Caption mistakes, branding violations, communication failures, and incorrect use of Sendblue-isms are all explicit grounds for withheld or forfeited payment.\",\n  \"The 2 Strike Rule is simple. First offense: written notice, potential payment reduction, correction required. Second offense: payment forfeited, relationship reviewed. Pattern of violations: immediate termination. This is not punitive — it's our quality standard.\",\n  \"This slide shows you exactly what we accept and what we reject. Correct terminology, proactive communication, and on-brand delivery — that's the standard. Wrong casing, late responses, and unsolicited style changes — those get rejected.\",\n  \"These are the video references that define the Sendblue style. Watch every single one before you edit your first project. Study the hook, the pacing, the caption timing, the b-roll selection. This is the benchmark. Your work must meet or exceed this standard.\",\n  \"Welcome to the team. You've earned this position. Now prove you deserve to keep it. Follow the guide, hold the standard, and produce work you'd be proud to put the Sendblue name on. Questions? Ask before you deliver, not after.\"\n]\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
